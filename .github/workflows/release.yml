name: Create Release

on:
  push:
    tags-ignore:
      - testing_*

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
      - name: Build
        run: |
          $ver = '${{ github.ref_name }}'
          invoke-expression 'dotnet build --no-restore --configuration Release --nologo -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver'
      - name: Verify repo.json matches tag
        run: |
          $expected = '${{ github.ref_name }}'
          $repo = (Get-Content -Raw './repo.json' | ConvertFrom-Json)[0]
          if ($repo.AssemblyVersion -ne $expected) {
            Write-Error "repo.json AssemblyVersion ($($repo.AssemblyVersion)) does not match tag ($expected). Did release.ps1 fail to commit?"
            exit 1
          }
      - name: Generate bin manifest from repo.json
        run: |
          $repo = Get-Content -Raw './repo.json' | ConvertFrom-Json
          $repo[0] | ConvertTo-Json -Depth 10 | Set-Content './RelicTerror/bin/Release/RelicTerror.json'
      - name: Archive
        run: Compress-Archive -Path RelicTerror/bin/Release/* -DestinationPath RelicTerror.zip
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          path: |
            ./RelicTerror/bin/Release/*
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" "./RelicTerror.zip" --title "RelicTerror ${{ github.ref_name }}"

      - name: Write out repo.json
        run: |
          $ver = '${{ github.ref_name }}'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].TestingAssemblyVersion = $ver
          $json[0].LastUpdate = [int][double]::Parse((Get-Date -UFormat %s))
          $json[0].DownloadLinkInstall = $json.DownloadLinkInstall -replace '[^/]+/RelicTerror.zip',"$ver/RelicTerror.zip"
          $json[0].DownloadLinkTesting = $json.DownloadLinkTesting -replace '[^/]+/RelicTerror.zip',"$ver/RelicTerror.zip"
          $json[0].DownloadLinkUpdate = $json.DownloadLinkUpdate -replace '[^/]+/RelicTerror.zip',"$ver/RelicTerror.zip"
          $content = $json | ConvertTo-Json -AsArray
          set-content -Path $path -Value $content

      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git branch -f main ${{ github.sha }}
          git checkout main
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin main
